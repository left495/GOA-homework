<!-- 1)შექმენით სარეგისტრაციო ფორმა  ფორმაშ უდნა გქონდეთ 4 ინფუთი თავისი ლეიბლებით(დააკავშირეთ ისინი ერთმანეთს for და id)

პირველი ინფუთი არის სახელისთვის type = "text"

მეორე ინფუთი არის გვარისთვის type = "text"

მესამე ინფუთო არის ემაილისთვის type = "email"

მეოთხე ინფუთი არის პაროლისთვის type = "password"

თქბენი დავალებაა რომ

და ის ელემენტები რომელსაც აქვს ატრიბუტი type = "password" გასტილეთ შემდეგნაირად  უკანა ფონის ფერი იასამნისფერი, ბორდერი 2px იანი წითელი , ტექსტის ფერი მწვანე , outline არ ქონდეს,კუთხეები მოამრგვალეთ 5px ით
